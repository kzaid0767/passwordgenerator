<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@1,800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <title>Kassim's Password Generator</title>
</head>
<body>
    <div class="main">
        <h1 class="first-h1">Generate a</h1>
        <h1 class="second-h1">random password</h1>
        <p class="ptext">Never use an insecure password again.</p>
        <label class="ptext" for="lengthpassword">Choose Length 8-20:</label>
        <input class="ptext" type="text" name="lengthpassword" id="lengthpassword" />
    
        <button onclick="main()" class=" curve generator-btn">Generate password</button>
        <div class="grayline"></div>
        <div class="password-cont">
            <div id="password1" class="curve password"></div>
            <div id="password2" class="curve password"></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
